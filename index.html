<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Camera Client | Firebase Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px 28px 0 0;
            padding: 18px 20px 30px;
            z-index: 10;
            transition: all 0.2s;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 48px;
        }
        .status-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #eef3ff;
        }
        .status-chip .material-icons {
            font-size: 18px;
        }
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(220,40,70,0.9);
            padding: 5px 14px;
            border-radius: 40px;
        }
        .rec-led {
            width: 10px;
            height: 10px;
            background: #ff3b4a;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .timer-text {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }
        .glass-btn {
            flex: 1;
            background: rgba(28, 34, 44, 0.85);
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255,255,255,0.15);
            border-radius: 56px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.18s;
            cursor: pointer;
        }
        .glass-btn:active { transform: scale(0.95); background: #3a4455; }
        .glass-btn .material-icons { font-size: 26px; color: #f0f3fc; }
        .btn-label { font-size: 10px; font-weight: 600; color: #b9c8ff; }
        .record-btn { background: linear-gradient(145deg, #dc2f4f, #b81c3a); box-shadow: 0 4px 12px #ff2a4a80; border: none; }
        @media (max-width: 500px) {
            .overlay { padding: 14px 16px 24px; }
            .glass-btn { padding: 8px 4px; }
            .glass-btn .material-icons { font-size: 22px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<div class="camera-container">
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="overlay">
        <div class="status-bar">
            <div class="status-chip"><span class="material-icons">videocam</span><span id="camState">مباشر</span></div>
            <div class="status-chip"><span class="material-icons" id="micIcon">mic</span><span id="micState">صوت نشط</span></div>
            <div class="rec-badge" id="recBadge" style="display:none"><div class="rec-led"></div><span class="timer-text" id="recTimer">00:00</span></div>
        </div>
        <div class="controls">
            <div class="glass-btn" id="flashBtn"><span class="material-icons" id="flashIcon">flash_off</span><span class="btn-label">فلاش</span></div>
            <div class="glass-btn" id="micToggleBtn"><span class="material-icons">mic</span><span class="btn-label">كتم</span></div>
            <div class="glass-btn record-btn" id="startRecordBtn"><span class="material-icons">fiber_manual_record</span><span class="btn-label">تسجيل</span></div>
            <div class="glass-btn" id="stopRecordBtn" style="opacity:0.5; pointer-events:none;"><span class="material-icons">stop</span><span class="btn-label">إيقاف</span></div>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue, update } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyCGLG6GGdxj0O74LVbrkQBAtLYbjc2VJ7M",
        authDomain: "studiocam-fdee0.firebaseapp.com",
        projectId: "studiocam-fdee0",
        storageBucket: "studiocam-fdee0.firebasestorage.app",
        messagingSenderId: "44954772669",
        appId: "1:44954772669:web:6e185b2b4b0c98a6a243d4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let localStream = null;
    let videoTrack = null;
    let audioTrack = null;
    let mediaRecorder = null;
    let isRecording = false;
    let recordedChunks = [];
    let recordTimer = null;
    let recordSeconds = 0;
    let torchEnabled = false;
    let micMuted = false;
    let cameraActive = false;
    let peerConnection = null;
    let cameraId = "cam1";
    let deviceName = "Camera 1";
    let signalingRef = null;
    let currentOffer = null;

    const localVideo = document.getElementById('localVideo');
    const camStateSpan = document.getElementById('camState');
    const micStateSpan = document.getElementById('micState');
    const micIconSpan = document.getElementById('micIcon');
    const recBadge = document.getElementById('recBadge');
    const recTimerSpan = document.getElementById('recTimer');
    const startRecBtn = document.getElementById('startRecordBtn');
    const stopRecBtn = document.getElementById('stopRecordBtn');
    const flashBtn = document.getElementById('flashBtn');
    const flashIcon = document.getElementById('flashIcon');
    const micToggleBtn = document.getElementById('micToggleBtn');

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: true
            });
            localStream = stream;
            localVideo.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            audioTrack = stream.getAudioTracks()[0];
            cameraActive = true;
            camStateSpan.innerText = 'مباشر';
            if(audioTrack) audioTrack.enabled = !micMuted;
            await set(ref(db, `cameras/${cameraId}`), {
                status: "online",
                name: deviceName,
                timestamp: Date.now(),
                micMuted: micMuted,
                flashOn: torchEnabled,
                recording: false
            });
            listenForCommands();
            setupWebRTC();
        } catch(err) {
            console.error(err);
            camStateSpan.innerText = 'خطأ';
            await set(ref(db, `cameras/${cameraId}`), { status: "error", name: deviceName });
        }
    }

    async function setupWebRTC() {
        signalingRef = ref(db, `signaling/${cameraId}`);
        onValue(signalingRef, async (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            if(data.offer && !peerConnection) {
                await handleOffer(data.offer);
            }
            if(data.answer && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
            if(data.iceCandidate && peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.iceCandidate));
                } catch(e) {}
            }
        });
    }

    async function handleOffer(offer) {
        if(peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });
        if(localStream) {
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
        }
        peerConnection.onicecandidate = (event) => {
            if(event.candidate) {
                update(ref(db, `signaling/${cameraId}`), { iceCandidate: event.candidate });
            }
        };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        await update(ref(db, `signaling/${cameraId}`), { answer: answer });
    }

    function listenForCommands() {
        const cmdRef = ref(db, `commands/${cameraId}`);
        onValue(cmdRef, (snapshot) => {
            const cmd = snapshot.val();
            if(!cmd) return;
            if(cmd.action === "start_recording") {
                startRecordingLocal();
            } else if(cmd.action === "stop_recording") {
                stopRecordingLocal();
            } else if(cmd.action === "toggle_mic") {
                toggleMicrophone();
            } else if(cmd.action === "toggle_flash") {
                toggleFlash();
            } else if(cmd.action === "disconnect") {
                resetConnection();
            }
            set(cmdRef, null);
        });
    }

    function startRecordingLocal() {
        if(!localStream || isRecording) return;
        recordedChunks = [];
        let mime = MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : '';
        try {
            mediaRecorder = new MediaRecorder(localStream, { mimeType: mime });
        } catch(e) { mediaRecorder = new MediaRecorder(localStream); }
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            if(recordedChunks.length) {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `recording_${Date.now()}.webm`;
                a.href = url;
                a.click();
                URL.revokeObjectURL(url);
            }
            recordedChunks = [];
        };
        mediaRecorder.start(500);
        isRecording = true;
        recordSeconds = 0;
        recTimerSpan.innerText = "00:00";
        recBadge.style.display = 'flex';
        startRecBtn.style.opacity = '0.5';
        startRecBtn.style.pointerEvents = 'none';
        stopRecBtn.style.opacity = '1';
        stopRecBtn.style.pointerEvents = 'auto';
        if(recordTimer) clearInterval(recordTimer);
        recordTimer = setInterval(() => {
            if(isRecording) {
                recordSeconds++;
                const mins = Math.floor(recordSeconds / 60);
                const secs = recordSeconds % 60;
                recTimerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }
        }, 1000);
        update(ref(db, `cameras/${cameraId}`), { recording: true });
    }

    function stopRecordingLocal() {
        if(mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            if(recordTimer) clearInterval(recordTimer);
            recBadge.style.display = 'none';
            startRecBtn.style.opacity = '1';
            startRecBtn.style.pointerEvents = 'auto';
            stopRecBtn.style.opacity = '0.5';
            stopRecBtn.style.pointerEvents = 'none';
            update(ref(db, `cameras/${cameraId}`), { recording: false });
        }
    }

    async function toggleFlash() {
        if(!videoTrack) return;
        try {
            const caps = videoTrack.getCapabilities();
            if(caps.torch) {
                torchEnabled = !torchEnabled;
                await videoTrack.applyConstraints({ advanced: [{ torch: torchEnabled }] });
                flashIcon.innerText = torchEnabled ? "flash_on" : "flash_off";
                update(ref(db, `cameras/${cameraId}`), { flashOn: torchEnabled });
            } else {
                alert("الفلاش غير مدعوم");
            }
        } catch(e) {}
    }

    function toggleMicrophone() {
        if(!audioTrack) return;
        micMuted = !micMuted;
        audioTrack.enabled = !micMuted;
        micStateSpan.innerText = micMuted ? "مكتوم" : "صوت نشط";
        micIconSpan.innerText = micMuted ? "mic_off" : "mic";
        update(ref(db, `cameras/${cameraId}`), { micMuted: micMuted });
    }

    function resetConnection() {
        if(peerConnection) peerConnection.close();
        peerConnection = null;
        set(ref(db, `signaling/${cameraId}`), null);
    }

    startRecBtn.addEventListener('click', startRecordingLocal);
    stopRecBtn.addEventListener('click', stopRecordingLocal);
    flashBtn.addEventListener('click', toggleFlash);
    micToggleBtn.addEventListener('click', toggleMicrophone);

    window.addEventListener('load', async () => {
        await initCamera();
        await set(ref(db, `cameras/${cameraId}`), {
            status: "online",
            name: deviceName,
            timestamp: Date.now(),
            micMuted: false,
            flashOn: false,
            recording: false
        });
        window.addEventListener('beforeunload', () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            set(ref(db, `cameras/${cameraId}`), { status: "offline" });
        });
    });
</script>
</body>
</html>
