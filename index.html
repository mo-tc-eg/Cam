<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mobile Camera Client | Pro Studio</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, Roboto, system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .video-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: contrast(1.02) saturate(1.06);
        }
        .gradient-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 15;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.2);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 40px;
        }
        .logo-area .material-icons {
            font-size: 20px;
            color: #ff3b6f;
        }
        .logo-area span:last-child {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.6px;
            color: white;
        }
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 16px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        .rec-dot {
            width: 10px;
            height: 10px;
            background: #ff2a4a;
            border-radius: 50%;
            animation: pulseRed 1s infinite;
            box-shadow: 0 0 6px #ff2a4a;
        }
        @keyframes pulseRed {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .timer-text {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }
        .bottom-dock {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            background: rgba(12, 12, 18, 0.8);
            backdrop-filter: blur(28px);
            border-top: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 32px 32px 0 0;
            padding: 18px 20px 32px;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .info-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #eef3ff;
            background: rgba(0,0,0,0.5);
            padding: 5px 14px;
            border-radius: 40px;
        }
        .info-chip .material-icons {
            font-size: 16px;
        }
        .device-name {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.5);
            padding: 5px 14px;
            border-radius: 40px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .ctrl {
            flex: 1;
            background: rgba(24, 28, 36, 0.9);
            backdrop-filter: blur(8px);
            border: 0.5px solid rgba(255,255,255,0.15);
            border-radius: 56px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.18s ease;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .ctrl:active {
            transform: scale(0.94);
            background: #2a2f3a;
        }
        .ctrl .material-icons {
            font-size: 26px;
            color: #f0f3fc;
        }
        .ctrl-label {
            font-size: 10px;
            font-weight: 600;
            color: #b9c8ff;
        }
        .record-ctrl {
            background: linear-gradient(145deg, #da2f4f, #b81c3a);
            border: none;
            box-shadow: 0 4px 16px rgba(220, 40, 70, 0.6);
        }
        .disabled-ctrl {
            opacity: 0.5;
            pointer-events: none;
        }
        @media (max-width: 500px) {
            .bottom-dock { padding: 14px 16px 26px; }
            .ctrl { padding: 10px 4px; }
            .ctrl .material-icons { font-size: 22px; }
            .ctrl-label { font-size: 9px; }
        }
        .status-live {
            color: #2eff8c;
            text-shadow: 0 0 4px #00cc55;
        }
        .error-toast {
            position: fixed;
            bottom: 30%;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            padding: 14px;
            border-radius: 32px;
            text-align: center;
            color: #ff9b8a;
            font-weight: 600;
            z-index: 100;
            font-size: 14px;
            border: 1px solid rgba(255,80,80,0.5);
        }
    </style>
</head>
<body>
<div class="app">
    <video id="cameraFeed" class="video-preview" autoplay playsinline></video>
    <div class="gradient-overlay"></div>

    <div class="top-toolbar">
        <div class="logo-area">
            <span class="material-icons">movie_creation</span>
            <span>STUDIO CAM</span>
        </div>
        <div id="recIndicator" class="rec-badge" style="display: none;">
            <div class="rec-dot"></div>
            <span class="timer-text" id="recordTimer">00:00</span>
        </div>
    </div>

    <div class="bottom-dock">
        <div class="info-panel">
            <div class="info-chip">
                <span class="material-icons" id="camIcon">videocam</span>
                <span id="camStatus">جاهزة</span>
            </div>
            <div class="info-chip">
                <span class="material-icons" id="micStateIcon">mic</span>
                <span id="micStatus">صوت نشط</span>
            </div>
            <div class="device-name">
                <span class="material-icons">smartphone</span>
                <span id="deviceModel">Mobile Pro</span>
            </div>
        </div>

        <div class="controls">
            <div class="ctrl" id="switchCameraBtn">
                <span class="material-icons">flip_camera_ios</span>
                <span class="ctrl-label">تبديل</span>
            </div>
            <div class="ctrl" id="toggleMicBtn">
                <span class="material-icons" id="micBtnIcon">mic</span>
                <span class="ctrl-label">كتم</span>
            </div>
            <div class="ctrl record-ctrl" id="startRecBtn">
                <span class="material-icons">fiber_manual_record</span>
                <span class="ctrl-label">تسجيل</span>
            </div>
            <div class="ctrl" id="stopRecBtn" style="opacity:0.5; pointer-events:none;">
                <span class="material-icons">stop</span>
                <span class="ctrl-label">إيقاف</span>
            </div>
            <div class="ctrl" id="fullscreenBtn">
                <span class="material-icons">fullscreen</span>
                <span class="ctrl-label">ملء</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let mediaStream = null;
        let videoTrack = null;
        let audioTrack = null;
        let mediaRecorder = null;
        let isRecording = false;
        let recordedChunks = [];
        let recordTimerInterval = null;
        let recordSeconds = 0;
        let currentFacing = "environment";
        let isMicMuted = false;
        let cameraEnabled = false;

        const video = document.getElementById('cameraFeed');
        const camStatusSpan = document.getElementById('camStatus');
        const camIconSpan = document.getElementById('camIcon');
        const micStatusSpan = document.getElementById('micStatus');
        const micStateIconSpan = document.getElementById('micStateIcon');
        const micBtnIconSpan = document.getElementById('micBtnIcon');
        const startRecBtn = document.getElementById('startRecBtn');
        const stopRecBtn = document.getElementById('stopRecBtn');
        const switchCamBtn = document.getElementById('switchCameraBtn');
        const toggleMicBtn = document.getElementById('toggleMicBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const recIndicatorDiv = document.getElementById('recIndicator');
        const recordTimerSpan = document.getElementById('recordTimer');
        const deviceModelSpan = document.getElementById('deviceModel');

        function setDeviceName() {
            const ua = navigator.userAgent;
            if (/iPhone/i.test(ua)) deviceModelSpan.innerText = 'iPhone 15 Pro';
            else if (/iPad/i.test(ua)) deviceModelSpan.innerText = 'iPad Pro';
            else if (/Android/i.test(ua)) deviceModelSpan.innerText = 'Galaxy Ultra';
            else deviceModelSpan.innerText = 'Cinema Device';
        }
        setDeviceName();

        function showErrorToast(msg) {
            let existing = document.querySelector('.error-toast');
            if(existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function acquireMedia(facingMode) {
            const constraints = {
                video: {
                    facingMode: { exact: facingMode },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 30 }
                },
                audio: true
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                return stream;
            } catch (err) {
                try {
                    const fallbackConstraints = {
                        video: { facingMode: facingMode },
                        audio: true
                    };
                    const fallbackStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    return fallbackStream;
                } catch (err2) {
                    try {
                        const onlyVideo = { video: { facingMode: facingMode }, audio: false };
                        const videoOnlyStream = await navigator.mediaDevices.getUserMedia(onlyVideo);
                        return videoOnlyStream;
                    } catch (err3) {
                        throw new Error('الرجاء السماح بالكاميرا والميكروفون');
                    }
                }
            }
        }

        async function initCameraAndMic() {
            if (mediaStream) {
                stopAllTracks();
            }
            try {
                const stream = await acquireMedia(currentFacing);
                mediaStream = stream;
                video.srcObject = stream;
                video.play().catch(e => console.log);
                videoTrack = stream.getVideoTracks()[0] || null;
                audioTrack = stream.getAudioTracks()[0] || null;
                cameraEnabled = true;

                if (audioTrack) {
                    audioTrack.enabled = !isMicMuted;
                }

                camStatusSpan.innerText = 'مباشر';
                camIconSpan.innerText = 'videocam';
                camStatusSpan.classList.add('status-live');
                
                if (isMicMuted) {
                    micStatusSpan.innerText = 'مكتوم';
                    micStateIconSpan.innerText = 'mic_off';
                    micBtnIconSpan.innerText = 'mic_off';
                } else {
                    micStatusSpan.innerText = 'صوت نشط';
                    micStateIconSpan.innerText = 'mic';
                    micBtnIconSpan.innerText = 'mic';
                }

                if ('wakeLock' in navigator) {
                    navigator.wakeLock.request('screen').catch(()=>{});
                }
            } catch (error) {
                console.error(error);
                cameraEnabled = false;
                camStatusSpan.innerText = 'فشل الإذن';
                camIconSpan.innerText = 'videocam_off';
                showErrorToast('يرجى السماح بالكاميرا والميكروفون');
                if (mediaStream) stopAllTracks();
            }
        }

        function stopAllTracks() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            video.srcObject = null;
            videoTrack = null;
            audioTrack = null;
            cameraEnabled = false;
            camStatusSpan.innerText = 'متوقفة';
            camIconSpan.innerText = 'videocam_off';
            camStatusSpan.classList.remove('status-live');
        }

        async function switchCamera() {
            if (!cameraEnabled || !mediaStream) {
                await initCameraAndMic();
                return;
            }
            if (isRecording) {
                showErrorToast('أوقف التسجيل أولاً');
                return;
            }
            const newFacing = currentFacing === 'environment' ? 'user' : 'environment';
            const wasMicMuted = isMicMuted;
            stopAllTracks();
            currentFacing = newFacing;
            try {
                const newStream = await acquireMedia(currentFacing);
                mediaStream = newStream;
                video.srcObject = newStream;
                videoTrack = newStream.getVideoTracks()[0];
                audioTrack = newStream.getAudioTracks()[0];
                cameraEnabled = true;
                if (audioTrack) {
                    audioTrack.enabled = !wasMicMuted;
                }
                isMicMuted = wasMicMuted;
                if (isMicMuted) {
                    micStatusSpan.innerText = 'مكتوم';
                    micStateIconSpan.innerText = 'mic_off';
                    micBtnIconSpan.innerText = 'mic_off';
                } else {
                    micStatusSpan.innerText = 'صوت نشط';
                    micStateIconSpan.innerText = 'mic';
                    micBtnIconSpan.innerText = 'mic';
                }
                camStatusSpan.innerText = 'مباشر';
                camIconSpan.innerText = 'videocam';
            } catch (err) {
                await initCameraAndMic();
            }
        }

        function toggleMicrophone() {
            if (!cameraEnabled || !mediaStream || !audioTrack) {
                if (!cameraEnabled) showErrorToast('الكاميرا غير نشطة');
                return;
            }
            isMicMuted = !isMicMuted;
            audioTrack.enabled = !isMicMuted;
            if (isMicMuted) {
                micStatusSpan.innerText = 'مكتوم';
                micStateIconSpan.innerText = 'mic_off';
                micBtnIconSpan.innerText = 'mic_off';
            } else {
                micStatusSpan.innerText = 'صوت نشط';
                micStateIconSpan.innerText = 'mic';
                micBtnIconSpan.innerText = 'mic';
            }
        }

        function startRecording() {
            if (!cameraEnabled || !mediaStream || !videoTrack) {
                showErrorToast('الكاميرا غير جاهزة');
                return;
            }
            if (isRecording) return;
            recordedChunks = [];
            let mimeType = 'video/webm';
            if (!MediaRecorder.isTypeSupported('video/webm')) {
                showErrorToast('التسجيل غير مدعوم');
                return;
            }
            try {
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
            } catch(e) {
                mediaRecorder = new MediaRecorder(mediaStream);
            }
            mediaRecorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) recordedChunks.push(event.data);
            };
            mediaRecorder.onstop = () => {
                if (recordedChunks.length) {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
                    link.download = `cinema_${timestamp}.webm`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }
                recordedChunks = [];
            };
            mediaRecorder.start(500);
            isRecording = true;
            recordSeconds = 0;
            updateTimerDisplay();
            recIndicatorDiv.style.display = 'flex';
            if (recordTimerInterval) clearInterval(recordTimerInterval);
            recordTimerInterval = setInterval(() => {
                if (isRecording) {
                    recordSeconds++;
                    updateTimerDisplay();
                }
            }, 1000);
            startRecBtn.style.opacity = '0.5';
            startRecBtn.style.pointerEvents = 'none';
            stopRecBtn.style.opacity = '1';
            stopRecBtn.style.pointerEvents = 'auto';
        }

        function updateTimerDisplay() {
            const mins = Math.floor(recordSeconds / 60);
            const secs = recordSeconds % 60;
            recordTimerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                isRecording = false;
                if (recordTimerInterval) clearInterval(recordTimerInterval);
                recordTimerInterval = null;
                recIndicatorDiv.style.display = 'none';
                startRecBtn.style.opacity = '1';
                startRecBtn.style.pointerEvents = 'auto';
                stopRecBtn.style.opacity = '0.5';
                stopRecBtn.style.pointerEvents = 'none';
                recordSeconds = 0;
                recordTimerSpan.innerText = '00:00';
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                isRecording = false;
                if (recordTimerInterval) clearInterval(recordTimerInterval);
                recIndicatorDiv.style.display = 'none';
                startRecBtn.style.opacity = '1';
                startRecBtn.style.pointerEvents = 'auto';
                stopRecBtn.style.opacity = '0.5';
                stopRecBtn.style.pointerEvents = 'none';
            }
        }

        function goFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        window.addEventListener('load', async () => {
            await initCameraAndMic();
        });

        switchCamBtn.addEventListener('click', switchCamera);
        toggleMicBtn.addEventListener('click', toggleMicrophone);
        startRecBtn.addEventListener('click', startRecording);
        stopRecBtn.addEventListener('click', stopRecording);
        fullscreenBtn.addEventListener('click', goFullscreen);

        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
            }
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
            }
        });

        setInterval(() => {
            if (cameraEnabled && mediaStream && videoTrack && videoTrack.readyState === 'live') {
                camStatusSpan.innerText = 'مباشر';
                camIconSpan.innerText = 'videocam';
            } else if (cameraEnabled && mediaStream) {
                camStatusSpan.innerText = 'مباشر';
            } else if (!cameraEnabled) {
                camStatusSpan.innerText = 'غير نشط';
            }
        }, 500);
    })();
</script>
</body>
</html>
