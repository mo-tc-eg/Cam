<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Broadcaster | 4K Live Stream</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#000;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;position:relative}
        #localVideo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
        .control-panel{position:absolute;bottom:20px;left:16px;right:16px;background:rgba(15,20,30,0.85);backdrop-filter:blur(20px);border-radius:32px;padding:16px;z-index:10;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .status-row{display:flex;justify-content:space-between;background:rgba(0,0,0,0.5);border-radius:60px;padding:8px 16px;margin-bottom:16px;font-size:12px;font-weight:500}
        .status-chip{display:flex;align-items:center;gap:6px;background:#1E2A3A;padding:4px 12px;border-radius:40px}
        .btn-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:12px}
        .ctrl-btn{background:#2A3A50;border:none;border-radius:60px;width:56px;height:56px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:0.1s;color:white}
        .ctrl-btn:active{transform:scale(0.92);background:#3E5A7A}
        .ctrl-btn .material-icons{font-size:28px}
        .record-btn{background:#E34F4F;width:70px;height:70px}
        .record-btn.recording{animation:pulseRec 1s infinite;background:#C62828}
        @keyframes pulseRec{0%{transform:scale(1);box-shadow:0 0 0 0 #ff5252}50%{transform:scale(1.02);box-shadow:0 0 0 8px rgba(255,82,82,0.3)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,82,82,0)}}
        .delay-buttons{display:flex;justify-content:center;gap:16px;margin-top:8px}
        .delay-chip{background:#000000aa;border-radius:40px;padding:6px 16px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;backdrop-filter:blur(4px)}
        @media (max-width:550px){.ctrl-btn{width:48px;height:48px}.ctrl-btn .material-icons{font-size:24px}.record-btn{width:60px;height:60px}.control-panel{padding:12px}}
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<video id="localVideo" autoplay playsinline muted></video>
<div class="control-panel">
    <div class="status-row">
        <div class="status-chip"><span class="material-icons" style="font-size:16px">videocam</span> <span id="liveStatus">LIVE</span></div>
        <div class="status-chip"><span class="material-icons" style="font-size:16px">mic</span> <span id="micStatus">ON</span></div>
        <div class="status-chip"><span class="material-icons" style="font-size:16px">flash_on</span> <span id="flashStatus">OFF</span></div>
        <div class="status-chip"><span class="material-icons" style="font-size:16px">battery_full</span> <span id="batteryLevel">--%</span></div>
    </div>
    <div class="btn-grid">
        <button class="ctrl-btn" id="switchCamBtn"><span class="material-icons">flip_camera_android</span></button>
        <button class="ctrl-btn" id="flashBtn"><span class="material-icons">flash_off</span></button>
        <button class="ctrl-btn" id="strobeBtn"><span class="material-icons">bolt</span></button>
        <button class="ctrl-btn" id="micMuteBtn"><span class="material-icons">mic</span></button>
        <button class="ctrl-btn" id="zoomInBtn"><span class="material-icons">zoom_in</span></button>
        <button class="ctrl-btn" id="zoomOutBtn"><span class="material-icons">zoom_out</span></button>
        <button class="ctrl-btn record-btn" id="recordMainBtn"><span class="material-icons">circle</span></button>
    </div>
    <div class="delay-buttons">
        <div class="delay-chip" data-delay="3"><span class="material-icons" style="font-size:16px">timer</span> 3s تسجيل</div>
        <div class="delay-chip" data-delay="10"><span class="material-icons" style="font-size:16px">hourglass_top</span> 10s تسجيل</div>
    </div>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyCGLG6GGdxj0O74LVbrkQBAtLYbjc2VJ7M",authDomain:"studiocam-fdee0.firebaseapp.com",databaseURL:"https://studiocam-fdee0-default-rtdb.europe-west1.firebasedatabase.app",projectId:"studiocam-fdee0",storageBucket:"studiocam-fdee0.firebasestorage.app",messagingSenderId:"44954772669",appId:"1:44954772669:web:6e185b2b4b0c98a6a243d4"};
const app=firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let localStream=null,peerConnection=null;
const camId="cam_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);
let currentFacing="user",torchActive=false,micMuted=false,currentZoom=1;
let mediaRecorder=null,recordedChunks=[],isRecording=false,countdownActive=false,recTimer=null;
const videoElem=document.getElementById("localVideo");
const camRef=db.ref(`studioCameras/${camId}`);
const controlRef=db.ref(`studioCameras/${camId}/control`);
async function initCamera(facing){if(localStream){localStream.getTracks().forEach(t=>t.stop());if(peerConnection){peerConnection.getSenders().forEach(s=>peerConnection.removeTrack(s));}}const constraints={video:{facingMode:{exact:facing},zoom:currentZoom},audio:true};try{const stream=await navigator.mediaDevices.getUserMedia(constraints);localStream=stream;videoElem.srcObject=stream;window.videoTrack=stream.getVideoTracks()[0];if(window.videoTrack&&window.videoTrack.getCapabilities().zoom)await window.videoTrack.applyConstraints({advanced:[{zoom:currentZoom}]});if(peerConnection&&peerConnection.signalingState!=="closed"){localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));const offer=await peerConnection.createOffer({iceRestart:true});await peerConnection.setLocalDescription(offer);await camRef.child("webrtc/offer").set({sdp:offer.sdp,type:offer.type});}document.getElementById("liveStatus").innerText="LIVE";updateMicUI();}catch(err){alert("الرجاء السماح بالكاميرا والميكروفون");}}
async function toggleFlash(){if(!window.videoTrack||!window.videoTrack.getCapabilities().torch){alert("الفلاش غير مدعوم");return;}torchActive=!torchActive;await window.videoTrack.applyConstraints({advanced:[{torch:torchActive}]});document.getElementById("flashStatus").innerText=torchActive?"ON":"OFF";document.getElementById("flashBtn").innerHTML=`<span class="material-icons">${torchActive?"flash_on":"flash_off"}</span>`;}
function toggleMute(){if(!localStream)return;const audioTracks=localStream.getAudioTracks();if(audioTracks.length){micMuted=!micMuted;audioTracks[0].enabled=!micMuted;updateMicUI();}}
function updateMicUI(){const micSpan=document.getElementById("micStatus");const micBtn=document.getElementById("micMuteBtn");if(micMuted){micSpan.innerText="OFF";micBtn.innerHTML='<span class="material-icons">mic_off</span>';}else{micSpan.innerText="ON";micBtn.innerHTML='<span class="material-icons">mic</span>';}}
async function setZoom(delta){if(!window.videoTrack)return;const caps=window.videoTrack.getCapabilities();if(caps.zoom){let newZoom=currentZoom+delta;newZoom=Math.min(caps.zoom.max||3,Math.max(caps.zoom.min||1,newZoom));currentZoom=newZoom;await window.videoTrack.applyConstraints({advanced:[{zoom:currentZoom}]});}}
async function setupWebRTC(){if(peerConnection)peerConnection.close();const config={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"turn:relay1.expressturn.com:3478",username:"efXWQY9KBX96Qk9D",credential:"dcVhHHQ1UjEqG3vM"},{urls:"turn:openrelay.metered.ca:80",username:"openrelayproject",credential:"openrelayproject"}]};peerConnection=new RTCPeerConnection(config);peerConnection.addTransceiver('video',{direction:'sendonly'});peerConnection.addTransceiver('audio',{direction:'sendonly'});if(localStream)localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));peerConnection.onicecandidate=e=>{if(e.candidate)camRef.child("webrtc/cameraIce").push(e.candidate.toJSON());};peerConnection.oniceconnectionstatechange=()=>{const state=peerConnection.iceConnectionState;document.getElementById("liveStatus").innerText=state==="connected"?"LIVE":"CONNECTING...";};const offer=await peerConnection.createOffer();await peerConnection.setLocalDescription(offer);await camRef.child("webrtc/offer").set({sdp:offer.sdp,type:offer.type});camRef.child("webrtc/answer").on("value",async(snap)=>{const ans=snap.val();if(ans&&peerConnection.signalingState==="have-local-offer"){await peerConnection.setRemoteDescription(new RTCSessionDescription(ans));}});camRef.child("webrtc/studioIce").on("child_added",async(snap)=>{const cand=snap.val();if(cand&&peerConnection.remoteDescription)try{await peerConnection.addIceCandidate(new RTCIceCandidate(cand));}catch(e){}});}
function startCountdown(seconds,callback){if(countdownActive)return;countdownActive=true;let count=seconds;const overlay=document.createElement("div");overlay.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:200;font-size:80px;font-weight:bold;color:white;font-family:monospace;backdrop-filter:blur(12px);pointer-events:none";overlay.innerText=count;document.body.appendChild(overlay);const interval=setInterval(()=>{count--;if(count>0)overlay.innerText=count;else{clearInterval(interval);overlay.remove();countdownActive=false;if(callback)callback();}},1000);}
function startRecording(){if(isRecording){if(mediaRecorder&&mediaRecorder.state!=="inactive")mediaRecorder.stop();return;}recordedChunks=[];const mime=MediaRecorder.isTypeSupported("video/webm")?"video/webm":"video/mp4";mediaRecorder=new MediaRecorder(localStream,{mimeType:mime});mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};mediaRecorder.onstop=()=>{const blob=new Blob(recordedChunks,{type:"video/webm"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`broadcast_${Date.now()}.webm`;a.click();URL.revokeObjectURL(url);isRecording=false;document.getElementById("recordMainBtn").classList.remove("recording");document.getElementById("recordMainBtn").innerHTML='<span class="material-icons">circle</span>';if(recTimer)clearInterval(recTimer);controlRef.child("recordCommand").set(null);};mediaRecorder.start(1000);isRecording=true;document.getElementById("recordMainBtn").classList.add("recording");document.getElementById("recordMainBtn").innerHTML='<span class="material-icons">stop</span>';controlRef.child("recordCommand").set("start");let startTime=Date.now();recTimer=setInterval(()=>{if(isRecording){const sec=Math.floor((Date.now()-startTime)/1000);const m=Math.floor(sec/60);const s=sec%60;document.getElementById("recordMainBtn").innerHTML=`<span style="font-size:14px">${m}:${s<10?'0'+s:s}</span>`;}else clearInterval(recTimer);},1000);}
function listenCommands(){controlRef.on("value",(snap)=>{const cmd=snap.val();if(!cmd)return;if(cmd.recordCommand==="start"&&!isRecording&&!countdownActive)startCountdown(3,startRecording);else if(cmd.recordCommand==="stop"&&isRecording)mediaRecorder.stop();if(cmd.hasOwnProperty("mute")&&cmd.mute!==micMuted)toggleMute();if(cmd.hasOwnProperty("flash")&&cmd.flash!==torchActive)toggleFlash();if(cmd.hasOwnProperty("zoom")&&!isNaN(cmd.zoom))setZoom(cmd.zoom-currentZoom);});}
async function updateBattery(){if('getBattery'in navigator){const b=await navigator.getBattery();document.getElementById("batteryLevel").innerText=Math.floor(b.level*100)+"%";}else document.getElementById("batteryLevel").innerText="—";}
function sendStatus(){camRef.update({status:"ready",online:true,recording:isRecording,muted:micMuted,flash:torchActive,battery:document.getElementById("batteryLevel").innerText,deviceName:"Mobile Broadcaster",timestamp:Date.now(),cameraId:camId}).catch(e=>console.warn);}
setInterval(sendStatus,5000);
window.addEventListener("beforeunload",()=>{if(peerConnection)peerConnection.close();if(localStream)localStream.getTracks().forEach(t=>t.stop());camRef.remove().catch(e=>{});});
(async()=>{await initCamera(currentFacing);await setupWebRTC();listenCommands();updateBattery();setInterval(updateBattery,30000);sendStatus();camRef.child("status").onDisconnect().set("offline");camRef.child("online").onDisconnect().set(false);document.getElementById("switchCamBtn").onclick=async()=>{currentFacing=currentFacing==="user"?"environment":"user";await initCamera(currentFacing);if(torchActive&&window.videoTrack)await window.videoTrack.applyConstraints({advanced:[{torch:true}]});};document.getElementById("flashBtn").onclick=toggleFlash;document.getElementById("strobeBtn").onclick=()=>{if(!window.videoTrack)return;let interval=setInterval(async()=>{torchActive=!torchActive;await window.videoTrack.applyConstraints({advanced:[{torch:torchActive}]});},200);setTimeout(()=>clearInterval(interval),3000);};document.getElementById("micMuteBtn").onclick=toggleMute;document.getElementById("zoomInBtn").onclick=()=>setZoom(0.2);document.getElementById("zoomOutBtn").onclick=()=>setZoom(-0.2);document.getElementById("recordMainBtn").onclick=()=>{if(isRecording)mediaRecorder.stop();else startCountdown(3,startRecording);};document.querySelectorAll(".delay-chip").forEach(el=>{el.onclick=()=>{const delay=parseInt(el.getAttribute("data-delay"));if(!isNaN(delay))startCountdown(delay,startRecording);};});})();
</script>
</body>
</html>
