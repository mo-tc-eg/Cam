<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Camera | Firebase Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px 28px 0 0;
            padding: 16px 20px 28px;
            z-index: 10;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 48px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #eef3ff;
        }
        .status-item .material-icons {
            font-size: 18px;
        }
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #dc2f4f;
            padding: 5px 14px;
            border-radius: 40px;
        }
        .rec-led {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .timer {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            background: rgba(28,34,44,0.9);
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255,255,255,0.15);
            border-radius: 56px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn:active { transform: scale(0.95); background: #3a4455; }
        .btn .material-icons { font-size: 26px; color: #f0f3fc; }
        .btn-label { font-size: 10px; font-weight: 600; color: #b9c8ff; }
        .btn-record {
            background: linear-gradient(145deg, #dc2f4f, #b81c3a);
            box-shadow: 0 4px 12px rgba(220,40,70,0.5);
            border: none;
        }
        .status-online {
            color: #3bff6e;
        }
        .status-offline {
            color: #ff884d;
        }
        @media (max-width: 500px) {
            .overlay { padding: 14px 16px 24px; }
            .btn { padding: 8px 4px; }
            .btn .material-icons { font-size: 22px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<div class="container">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
        <div class="status-bar">
            <div class="status-item">
                <span class="material-icons">videocam</span>
                <span id="camStatus">جار التشغيل</span>
            </div>
            <div class="status-item">
                <span class="material-icons" id="micIcon">mic</span>
                <span id="micStatus">صوت نشط</span>
            </div>
            <div id="recIndicator" class="rec-badge" style="display:none">
                <div class="rec-led"></div>
                <span class="timer" id="timerDisplay">00:00</span>
            </div>
        </div>
        <div class="controls">
            <div class="btn" id="flashBtn">
                <span class="material-icons">flash_off</span>
                <span class="btn-label">فلاش</span>
            </div>
            <div class="btn" id="micBtn">
                <span class="material-icons">mic</span>
                <span class="btn-label">كتم</span>
            </div>
            <div class="btn btn-record" id="recordBtn">
                <span class="material-icons">fiber_manual_record</span>
                <span class="btn-label">تسجيل</span>
            </div>
            <div class="btn" id="stopRecordBtn" style="opacity:0.5; pointer-events:none;">
                <span class="material-icons">stop</span>
                <span class="btn-label">إيقاف</span>
            </div>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue, update } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyCGLG6GGdxj0O74LVbrkQBAtLYbjc2VJ7M",
        authDomain: "studiocam-fdee0.firebaseapp.com",
        projectId: "studiocam-fdee0",
        storageBucket: "studiocam-fdee0.firebasestorage.app",
        messagingSenderId: "44954772669",
        appId: "1:44954772669:web:6e185b2b4b0c98a6a243d4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let mediaStream = null;
    let videoTrack = null;
    let audioTrack = null;
    let mediaRecorder = null;
    let isRecording = false;
    let recordedChunks = [];
    let recordTimer = null;
    let recordSeconds = 0;
    let torchEnabled = false;
    let micMuted = false;
    let cameraActive = false;

    const video = document.getElementById('video');
    const camStatusSpan = document.getElementById('camStatus');
    const micStatusSpan = document.getElementById('micStatus');
    const micIconSpan = document.getElementById('micIcon');
    const recIndicator = document.getElementById('recIndicator');
    const timerDisplay = document.getElementById('timerDisplay');
    const recordBtn = document.getElementById('recordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const flashBtn = document.getElementById('flashBtn');
    const flashIcon = flashBtn.querySelector('.material-icons');
    const micBtn = document.getElementById('micBtn');
    const CAMERA_ID = "cam1";
    const CAMERA_NAME = "Camera 1";

    async function sendStatusToFirebase() {
        try {
            await set(ref(db, `cameras/${CAMERA_ID}`), {
                status: cameraActive ? "online" : "offline",
                name: CAMERA_NAME,
                timestamp: Date.now(),
                micMuted: micMuted,
                flashOn: torchEnabled,
                recording: isRecording
            });
            console.log("✅ تم إرسال الحالة إلى Firebase:", { micMuted, torchEnabled, isRecording });
        } catch(err) {
            console.error("❌ فشل إرسال الحالة:", err);
        }
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: true
            });
            mediaStream = stream;
            video.srcObject = stream;
            await video.play();
            videoTrack = stream.getVideoTracks()[0];
            audioTrack = stream.getAudioTracks()[0];
            cameraActive = true;
            camStatusSpan.innerText = "مباشر";
            camStatusSpan.style.color = "#3bff6e";
            if(audioTrack) audioTrack.enabled = !micMuted;
            await sendStatusToFirebase();
            listenForCommands();
            console.log("✅ الكاميرا تعمل بشكل طبيعي");
        } catch(err) {
            console.error("❌ خطأ في الكاميرا:", err);
            cameraActive = false;
            camStatusSpan.innerText = "خطأ";
            camStatusSpan.style.color = "#ff884d";
            await sendStatusToFirebase();
        }
    }

    async function toggleFlash() {
        if(!videoTrack) return;
        try {
            const caps = videoTrack.getCapabilities();
            if(caps.torch) {
                torchEnabled = !torchEnabled;
                await videoTrack.applyConstraints({ advanced: [{ torch: torchEnabled }] });
                flashIcon.innerText = torchEnabled ? "flash_on" : "flash_off";
                await sendStatusToFirebase();
                console.log("💡 فلاش:", torchEnabled ? "تشغيل" : "إيقاف");
            } else {
                console.log("⚠️ الفلاش غير مدعوم");
            }
        } catch(e) {
            console.error("❌ خطأ في الفلاش:", e);
        }
    }

    function toggleMicrophone() {
        if(!audioTrack) return;
        micMuted = !micMuted;
        audioTrack.enabled = !micMuted;
        micStatusSpan.innerText = micMuted ? "مكتوم" : "صوت نشط";
        micIconSpan.innerText = micMuted ? "mic_off" : "mic";
        sendStatusToFirebase();
        console.log("🎤 ميكروفون:", micMuted ? "مكتوم" : "نشط");
    }

    function startRecordingLocal() {
        if(!mediaStream || isRecording) return;
        recordedChunks = [];
        try {
            mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
        } catch(e) {
            mediaRecorder = new MediaRecorder(mediaStream);
        }
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            if(recordedChunks.length) {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `recording_${Date.now()}.webm`;
                a.href = url;
                a.click();
                URL.revokeObjectURL(url);
                console.log("💾 تم حفظ التسجيل");
            }
            recordedChunks = [];
        };
        mediaRecorder.start(500);
        isRecording = true;
        recordSeconds = 0;
        timerDisplay.innerText = "00:00";
        recIndicator.style.display = "flex";
        recordBtn.style.opacity = "0.5";
        recordBtn.style.pointerEvents = "none";
        stopRecordBtn.style.opacity = "1";
        stopRecordBtn.style.pointerEvents = "auto";
        if(recordTimer) clearInterval(recordTimer);
        recordTimer = setInterval(() => {
            if(isRecording) {
                recordSeconds++;
                const mins = Math.floor(recordSeconds / 60);
                const secs = recordSeconds % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }
        }, 1000);
        sendStatusToFirebase();
        console.log("🔴 بدء التسجيل");
    }

    function stopRecordingLocal() {
        if(mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            if(recordTimer) clearInterval(recordTimer);
            recIndicator.style.display = "none";
            recordBtn.style.opacity = "1";
            recordBtn.style.pointerEvents = "auto";
            stopRecordBtn.style.opacity = "0.5";
            stopRecordBtn.style.pointerEvents = "none";
            sendStatusToFirebase();
            console.log("⏹️ إيقاف التسجيل");
        }
    }

    function listenForCommands() {
        const cmdRef = ref(db, `commands/${CAMERA_ID}`);
        onValue(cmdRef, (snapshot) => {
            const cmd = snapshot.val();
            if(!cmd) return;
            console.log("📩 أمر مستلم:", cmd);
            if(cmd.action === "start_recording") {
                startRecordingLocal();
            } else if(cmd.action === "stop_recording") {
                stopRecordingLocal();
            } else if(cmd.action === "toggle_mic") {
                toggleMicrophone();
            } else if(cmd.action === "toggle_flash") {
                toggleFlash();
            } else if(cmd.action === "disconnect") {
                console.log("🔌 أمر فصل مستلم");
            }
            set(cmdRef, null);
        });
    }

    recordBtn.addEventListener('click', startRecordingLocal);
    stopRecordBtn.addEventListener('click', stopRecordingLocal);
    flashBtn.addEventListener('click', toggleFlash);
    micBtn.addEventListener('click', toggleMicrophone);

    window.addEventListener('load', async () => {
        console.log("🚀 بدء تشغيل الكاميرا...");
        await initCamera();
    });

    window.addEventListener('beforeunload', () => {
        if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        set(ref(db, `cameras/${CAMERA_ID}`), { status: "offline", name: CAMERA_NAME });
    });

    setInterval(() => {
        if(cameraActive) {
            sendStatusToFirebase();
        }
    }, 3000);
</script>
</body>
</html>
